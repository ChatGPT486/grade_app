name: grade_calculator
description: ICT University Grade Calculator with Supabase backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  excel: ^4.0.2
  path_provider: ^2.1.2
  open_file: ^3.3.2
  uuid: ^4.3.3
  intl: ^0.19.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ict_logo.png